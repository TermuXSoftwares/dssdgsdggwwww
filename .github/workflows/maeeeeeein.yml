name: Build APKeeeeee
on:
  push:
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y openjdk-17-jdk
      
      - name: Setup Android SDK
        uses: android-actions/setup-android@v2
      
      - name: Install Python packages
        run: pip install buildozer kivy cryptography cython
      
      - name: Build
        run: |
          cd UnBlock-v1.0.1/Android
          buildozer android debug
      
      - name: Upload APK
        uses: actions/upload-artifact?v4
        with:
          name: UnBlock.apk
          path: UnBlock-v1.0.1/Android/bin/*.apk
